<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-S3 CSI Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  font-family: "IBM Plex Sans", sans-serif;
  background: #121212;
  color: #d1d5db;
  height: 100vh;
  overflow: hidden;
}

/* Custom Slim Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #444;
}

/* Header with Logo */
header {
  height: 60px;
  background: #1c1c1c;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid #2d2d2d;
  justify-content: space-between;
}
.logo-container {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-container img {
  max-height: 28px;
  filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
}
.logo-container h1 {
  font-size: 16px;
  font-weight: 800;
  margin: 0;
  letter-spacing: 1px;
  color: #fff;
  text-transform: uppercase;
}

#connection-status {
  padding: 5px 15px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#connection-status.connected { background: #064e3b; color: #34d399; border: 1px solid #065f46; }
#connection-status.reconnecting { background: #451a03; color: #fbbf24; border: 1px solid #78350f; }
#connection-status.disconnected { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }

.dashboard-content {
  padding: 15px;
  height: calc(100vh - 60px);
}
.grid {
  display: grid;
  grid-template-columns: 2.8fr 1fr;
  grid-template-rows: 2fr 1fr 1fr;
  gap: 15px;
  height: 100%;
}
.panel {
  background: #1c1c1c; /* Matte Gray/Black Panel */
  border-radius: 6px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid #2d2d2d;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
}
.panel h2 {
  margin: 0 0 15px 0;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #9ca3af; /* Brightened for better contrast */
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel h2::before { content: ''; display: inline-block; width: 4px; height: 4px; background: #60a5fa; border-radius: 50%; }

.heatmap-panel { grid-row: 1 / 3; grid-column: 1; overflow-y: auto; }

.node-block { margin-bottom: 35px; }
.node-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 5px;
}
.node-title {
  font-size: 14px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.node-stats {
  display: flex;
  gap: 8px;
}
.stat-badge {
  padding: 2px 8px;
  background: #262626;
  border: 1px solid #333;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  font-family: ui-monospace, monospace;
  color: #9ca3af;
  display: flex;
  gap: 5px;
}
.stat-badge span { color: #60a5fa; }
.stat-badge.rssi span { color: #4ade80; } /* Green for signal */
.stat-badge.stability span { color: #facc15; } /* Yellow for stability */

.heatmap-layout {
  display: flex;
  height: 250px;
  gap: 15px;
  align-items: center;
}
.canvas-container {
  flex: 1;
  height: 100%;
  background: #000;
  border: 1px solid #2d2d2d;
  border-radius: 2px;
}
canvas.node-canvas { width: 100%; height: 100%; display: block; }

.colorbar-container { display: flex; height: 100%; align-items: center; gap: 8px; }
.colorbar-scale {
  width: 12px;
  height: 90%;
  background: linear-gradient(to top, #000080, #0000ff, #00ffff, #ffff00, #ff0000, #800000);
  border: 1px solid #333;
}
.colorbar-ticks {
  display: flex; flex-direction: column; justify-content: space-between; height: 90%;
  font-size: 9px; color: #9ca3af; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.colorbar-label { writing-mode: vertical-lr; transform: rotate(180deg); font-size: 10px; color: #9ca3af; font-weight: 600; }

.presence-indicator { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
.presence-circle {
  width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px;
  transition: all 0.6s ease;
}
.presence-circle.empty { background: #064e3b; border: 4px solid #065f46; box-shadow: 0 0 20px rgba(52, 211, 153, 0.1); }
.presence-circle.occupied { background: #450a0a; border: 4px solid #7f1d1d; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); }
.presence-circle.unknown { background: #1f2937; border: 4px solid #374151; }
.presence-label { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 2px; }

.activity-display { display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center; }
.activity-label { font-size: 42px; font-weight: 900; color: #fff; margin-bottom: 10px; letter-spacing: -1px; }
.confidence-bar-outer { width: 70%; margin: 0 auto; height: 4px; background: #2d2d2d; border-radius: 2px; overflow: hidden; }
.confidence-bar-inner { height: 100%; background: #3b82f6; }

.alert-item { padding: 12px; border-radius: 4px; background: #181818; font-size: 11px; margin-bottom: 6px; display: flex; gap: 15px; border: 1px solid #262626; }
.alert-item.intrusion { border-left: 3px solid #ef4444; background: #2a0a0a; }
.health-table { width: 100%; font-size: 11px; border-collapse: collapse; }
.health-table th { text-align: left; padding: 10px; color: #9ca3af; border-bottom: 1px solid #2d2d2d; }
.health-table td { padding: 10px; border-bottom: 1px solid #2d2d2d; color: #e5e7eb; }
</style>
</head>
<body>
<header>
  <div class="logo-container">
    <img src="logo.svg" alt="Logo">
    <h1>ESP32 CSI Monitor</h1>
  </div>
  <div id="connection-status" class="disconnected">Offline</div>
</header>
<div class="dashboard-content">
  <div class="grid">
    <div class="panel heatmap-panel">
      <h2>Heatmap Waterfall</h2>
      <div id="nodes-container"></div>
    </div>
    <div class="panel presence-panel"><h2>Detection</h2><div id="presence" class="presence-indicator"></div></div>
    <div class="panel activity-panel"><h2>Activity</h2><div id="activity" class="activity-display"></div></div>
    <div class="panel alerts-panel"><h2>Events</h2><div id="alerts" style="overflow-y:auto"></div></div>
    <div class="panel health-panel"><h2>Nodes</h2><div id="health"></div></div>
  </div>
</div>
<script>
const WS_URL = `ws://${window.location.host}/ws`;
const state = { ws: null, canvases: {} };

function getJetColor(v) {
  v = Math.max(0, Math.min(1, v));
  const r = v < 0.35 ? 0 : v < 0.66 ? 255 * (v - 0.35) / 0.31 : 255;
  const g = v < 0.125 ? 0 : v < 0.375 ? 255 * (v - 0.125) / 0.25 : v < 0.64 ? 255 : v < 0.91 ? 255 * (1 - (v - 0.64) / 0.27) : 0;
  const b = v < 0.11 ? 128 + 128 * (v / 0.11) : v < 0.34 ? 255 : v < 0.65 ? 255 * (1 - (v - 0.34) / 0.31) : 0;
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

function connect() {
  state.ws = new WebSocket(WS_URL);
  state.ws.onopen = () => setConnectionStatus('connected', 'Live');
  state.ws.onmessage = (ev) => { try { updatePanels(JSON.parse(ev.data)); } catch (e) {} };
  state.ws.onclose = () => { setConnectionStatus('disconnected', 'Offline'); setTimeout(connect, 2000); };
}

function setConnectionStatus(cls, text) {
  const el = document.getElementById('connection-status');
  el.className = cls; el.textContent = text;
}

function updatePanels(data) {
  if (data.heatmap) updateHeatmaps(data.heatmap);
  updatePresence(data.presence);
  updateActivity(data.activity);
  updateAlerts(data.alerts);
  updateHealth(data.node_health);
}

function updateHeatmaps(heatmapData) {
  const container = document.getElementById('nodes-container');
  Object.keys(heatmapData).forEach(nid => {
    if (!state.canvases[nid]) {
      const nodeBlock = document.createElement('div');
      nodeBlock.className = 'node-block';
      nodeBlock.innerHTML = `
        <div class="node-header">
          <div class="node-title">NODE_${nid}_DATA_STREAM</div>
          <div id="stats-${nid}" style="font-size:10px; color:#9ca3af; font-family:monospace; font-weight:600"></div>
        </div>
        <div class="heatmap-layout">
          <div class="canvas-container"><canvas class="node-canvas"></canvas></div>
          <div class="colorbar-container">
            <div class="colorbar-scale"></div>
            <div class="colorbar-ticks">
              <span>30</span><span>20</span><span>10</span><span>0</span>
            </div>
            <div class="colorbar-label">Amplitude</div>
          </div>
        </div>
      `;
      container.appendChild(nodeBlock);
      state.canvases[nid] = nodeBlock.querySelector('canvas');
    }

    const canvas = state.canvases[nid];
    const frames = heatmapData[nid];
    if (frames.length > 0) {
      const lastFrame = frames[frames.length - 1];
      const avgAmp = lastFrame.reduce((a, b) => a + b, 0) / lastFrame.length;
      const variance = lastFrame.reduce((a, b) => a + Math.abs(b - avgAmp), 0) / lastFrame.length;
      const stability = Math.max(0, 100 - (variance * 5));
      document.getElementById(`stats-${nid}`).textContent = `RSSI: -45dBm | AMP: ${avgAmp.toFixed(1)}dB | STB: ${Math.round(stability)}%`;
    }

    const ctx = canvas.getContext('2d');
    const rect = canvas.parentNode.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;

    const rows = 64;
    const cols = frames.length;
    const cellW = canvas.width / cols;
    const cellH = canvas.height / rows;

    frames.forEach((frame, x) => {
      frame.forEach((val, y) => {
        if (y >= rows) return;
        ctx.fillStyle = getJetColor(val / 30);
        ctx.fillRect(x * cellW, y * cellH, cellW + 1, cellH + 1);
      });
    });
  });
}

function updatePresence(presence) {
  const container = document.getElementById('presence');
  // Prioritize 'system' state, otherwise take the first node state
  const statusKey = presence.hasOwnProperty('system') ? 'system' : Object.keys(presence)[0];
  if (!statusKey) return;
  
  const status = presence[statusKey];
  const cls = status === 'occupied' ? 'occupied' : status === 'empty' ? 'empty' : 'unknown';
  
  container.innerHTML = `
    <div class="presence-circle ${cls}"></div>
    <div class="presence-label">${status.toUpperCase()}</div>
    <div style="font-size:10px; color:#6b7280; margin-top:5px">${statusKey === 'system' ? 'SYSTEM STATUS' : 'NODE ' + statusKey}</div>
  `;
}

function updateActivity(activity) {
  const container = document.getElementById('activity');
  const nid = Object.keys(activity)[0];
  if (!nid || !activity[nid]) return;
  const a = activity[nid];
  const pct = Math.round(a.confidence * 100);
  container.innerHTML = `
    <div class="activity-label">${a.label.toUpperCase()}</div>
    <div class="confidence-bar-outer"><div class="confidence-bar-inner" style="width:${pct}%"></div></div>
    <div style="font-size:10px; margin-top:10px; color:#444; font-weight:bold">CONFIDENCE: ${pct}%</div>
  `;
}

function updateAlerts(alerts) {
  const container = document.getElementById('alerts');
  container.innerHTML = (alerts || []).slice(0, 10).map(a => `
    <div class="alert-item ${a.type === 'intrusion' ? 'intrusion' : ''}">
      <span style="color:#555">${new Date(a.timestamp).toLocaleTimeString()}</span>
      <b style="color:#3b82f6">N${a.node_id}</b>
      <span>${a.type.toUpperCase()}</span>
    </div>
  `).join('');
}

function updateHealth(health) {
  const container = document.getElementById('health');
  container.innerHTML = `<table class="health-table">
    <tr><th>NODE</th><th>FPS</th><th>LINK</th></tr>
    ${Object.entries(health).map(([nid, info]) => `
      <tr><td><b>${nid}</b></td><td>${Math.round(info.fps)}</td><td style="color:${info.stale ? '#ef4444' : '#059669'}">${info.stale ? 'LOST' : 'OK'}</td></tr>
    `).join('')}
  </table>`;
}

document.addEventListener('DOMContentLoaded', connect);
</script>
</body>
</html>
</script>
</body>
</html>
