<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-S3 CSI Wallhack Dashboard</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
}
#connection-status {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  z-index: 100;
}
#connection-status.connected { background: #22c55e; color: #fff; }
#connection-status.reconnecting { background: #eab308; color: #000; }
#connection-status.disconnected { background: #ef4444; color: #fff; }
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: 2fr 1fr 1fr;
  gap: 10px;
  height: calc(100vh - 20px);
}
.panel {
  background: #1e293b;
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel h2 {
  margin: 0 0 8px 0;
  font-size: 14px;
  text-transform: uppercase;
  color: #94a3b8;
}
.heatmap-panel { grid-row: 1 / 3; grid-column: 1; }
.presence-panel { grid-row: 1; grid-column: 2; }
.activity-panel { grid-row: 2; grid-column: 2; }
.alerts-panel { grid-row: 3; grid-column: 1; }
.health-panel { grid-row: 3; grid-column: 2; }
#heatmap {
  width: 100%;
  height: 100%;
  background: #020617;
  border-radius: 4px;
}
.presence-indicator {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
}
.presence-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  transition: background 0.3s;
}
.presence-circle.empty { background: #22c55e; }
.presence-circle.occupied { background: #ef4444; }
.presence-circle.unknown { background: #64748b; }
.presence-label {
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
}
.activity-display {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  gap: 8px;
}
.activity-label {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
}
.confidence-bar-outer {
  width: 100%;
  height: 20px;
  background: #334155;
  border-radius: 4px;
  overflow: hidden;
}
.confidence-bar-inner {
  height: 100%;
  background: #3b82f6;
  transition: width 0.3s;
}
.confidence-text {
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
}
.alerts-list {
  overflow-y: auto;
  max-height: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.alert-item {
  padding: 6px 8px;
  border-radius: 4px;
  background: #334155;
  font-size: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.alert-item.intrusion { background: #7f1d1d; }
.alert-time { color: #94a3b8; white-space: nowrap; }
.alert-node { background: #475569; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
.alert-type { font-weight: 600; }
.health-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.health-table th {
  text-align: left;
  padding: 4px;
  color: #94a3b8;
  border-bottom: 1px solid #334155;
}
.health-table td {
  padding: 4px;
  border-bottom: 1px solid #334155;
}
.health-status.online { color: #22c55e; }
.health-status.stale { color: #ef4444; }
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    height: auto;
    overflow-y: auto;
  }
  .heatmap-panel { grid-row: auto; grid-column: auto; min-height: 300px; }
  .presence-panel { grid-row: auto; grid-column: auto; }
  .activity-panel { grid-row: auto; grid-column: auto; }
  .alerts-panel { grid-row: auto; grid-column: auto; }
  .health-panel { grid-row: auto; grid-column: auto; }
}
</style>
</head>
<body>
<div id="connection-status" class="disconnected">Disconnected</div>
<div class="grid">
  <div class="panel heatmap-panel"><h2>CSI Heatmap</h2><canvas id="heatmap"></canvas></div>
  <div class="panel presence-panel"><h2>Presence</h2><div id="presence"></div></div>
  <div class="panel activity-panel"><h2>Activity</h2><div id="activity"></div></div>
  <div class="panel alerts-panel"><h2>Alerts</h2><div id="alerts" class="alerts-list"></div></div>
  <div class="panel health-panel"><h2>Node Health</h2><div id="health"></div></div>
</div>
<script>
const WS_URL = `ws://${window.location.host}/ws`;
const RECONNECT_BASE = 1000;
const RECONNECT_MAX = 30000;
const state = { ws: null, reconnectAttempts: 0, reconnectTimer: null };

function connect() {
  state.ws = new WebSocket(WS_URL);
  state.ws.onopen = () => {
    state.reconnectAttempts = 0;
    setConnectionStatus('connected', 'Connected');
  };
  state.ws.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      updatePanels(data);
    } catch (e) {
      console.error('WS parse error', e);
    }
  };
  state.ws.onclose = () => {
    setConnectionStatus('disconnected', 'Disconnected');
    scheduleReconnect();
  };
  state.ws.onerror = (e) => {
    console.error('WS error', e);
  };
}

function scheduleReconnect() {
  if (state.reconnectTimer) return;
  setConnectionStatus('reconnecting', 'Reconnecting...');
  const delay = Math.min(RECONNECT_BASE * 2 ** state.reconnectAttempts, RECONNECT_MAX);
  state.reconnectAttempts++;
  state.reconnectTimer = setTimeout(() => {
    state.reconnectTimer = null;
    connect();
  }, delay);
}

function setConnectionStatus(cls, text) {
  const el = document.getElementById('connection-status');
  el.className = cls;
  el.textContent = text;
}

function updatePanels(data) {
  updateHeatmap(data.heatmap);
  updatePresence(data.presence);
  updateActivity(data.activity);
  updateAlerts(data.alerts);
  updateHealth(data.node_health);
}

function updateHeatmap(heatmapData) {
  const canvas = document.getElementById('heatmap');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width;
  const h = rect.height;
  ctx.clearRect(0, 0, w, h);

  if (!heatmapData) return;
  const nodes = Object.keys(heatmapData);
  if (nodes.length === 0) return;

  const nid = nodes[0];
  const frames = heatmapData[nid];
  if (!frames || frames.length === 0) return;

  const rows = frames[0].length;
  const cols = frames.length;

  let minVal = Infinity, maxVal = -Infinity;
  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      const v = frames[x][y];
      if (v < minVal) minVal = v;
      if (v > maxVal) maxVal = v;
    }
  }
  if (minVal === maxVal) { minVal = 0; maxVal = 1; }

  const cellW = w / cols;
  const cellH = h / rows;

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      const v = (frames[x][y] - minVal) / (maxVal - minVal);
      ctx.fillStyle = getColor(v);
      ctx.fillRect(x * cellW, y * cellH, cellW + 0.5, cellH + 0.5);
    }
  }
}

function getColor(t) {
  if (t < 0.33) {
    const p = t / 0.33;
    return `rgb(${Math.round(p * 0)}, ${Math.round(p * 255)}, ${Math.round(255 * (1 - p) + p * 0)})`;
  } else if (t < 0.66) {
    const p = (t - 0.33) / 0.33;
    return `rgb(${Math.round(p * 255)}, 255, 0)`;
  } else {
    const p = (t - 0.66) / 0.34;
    return `rgb(255, ${Math.round(255 * (1 - p))}, 0)`;
  }
}

function updatePresence(presence) {
  const container = document.getElementById('presence');
  if (!presence || Object.keys(presence).length === 0) {
    container.innerHTML = '<div class="presence-indicator"><div class="presence-circle unknown"></div><div class="presence-label">UNKNOWN</div></div>';
    return;
  }
  let html = '';
  for (const [nid, status] of Object.entries(presence)) {
    const cls = status === 'occupied' ? 'occupied' : status === 'empty' ? 'empty' : 'unknown';
    html += `<div class="presence-indicator"><div class="presence-circle ${cls}"></div><div class="presence-label">Node ${nid}: ${status}</div></div>`;
  }
  container.innerHTML = html;
}

function updateActivity(activity) {
  const container = document.getElementById('activity');
  if (!activity) {
    container.innerHTML = '<div class="activity-display"><div class="activity-label">No activity detected</div></div>';
    return;
  }
  const nodes = Object.keys(activity);
  let selected = null;
  for (const nid of nodes) {
    const a = activity[nid];
    if (a && a.label) { selected = a; break; }
  }
  if (!selected) {
    container.innerHTML = '<div class="activity-display"><div class="activity-label">No activity detected</div></div>';
    return;
  }
  const pct = Math.round((selected.confidence || 0) * 100);
  container.innerHTML = `
    <div class="activity-display">
      <div class="activity-label">${selected.label.toUpperCase()}</div>
      <div class="confidence-bar-outer"><div class="confidence-bar-inner" style="width:${pct}%"></div></div>
      <div class="confidence-text">Confidence: ${pct}%</div>
    </div>`;
}

function updateAlerts(alerts) {
  const container = document.getElementById('alerts');
  if (!alerts || alerts.length === 0) {
    container.innerHTML = '<div style="color:#64748b;font-size:12px;">No alerts</div>';
    return;
  }
  let html = '';
  for (const alert of alerts.slice(0, 10)) {
    const ts = alert.timestamp ? new Date(alert.timestamp).toLocaleTimeString() : '—';
    const typeClass = alert.type === 'intrusion' ? 'intrusion' : '';
    html += `<div class="alert-item ${typeClass}">
      <span class="alert-time">${ts}</span>
      <span class="alert-node">Node ${alert.node_id}</span>
      <span class="alert-type">${alert.type}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function updateHealth(health) {
  const container = document.getElementById('health');
  if (!health || Object.keys(health).length === 0) {
    container.innerHTML = '<div style="color:#64748b;font-size:12px;">No nodes connected</div>';
    return;
  }
  let html = '<table class="health-table"><tr><th>Node</th><th>FPS</th><th>Status</th></tr>';
  for (const [nid, info] of Object.entries(health)) {
    const status = info.stale ? 'STALE' : 'ONLINE';
    const statusClass = info.stale ? 'stale' : 'online';
    html += `<tr><td>${nid}</td><td>${Math.round(info.fps || 0)}</td><td class="health-status ${statusClass}">${status}</td></tr>`;
  }
  html += '</table>';
  container.innerHTML = html;
}

function resizeCanvas() {
  const canvas = document.getElementById('heatmap');
  if (!canvas) return;
}

window.addEventListener('resize', resizeCanvas);
document.addEventListener('DOMContentLoaded', () => {
  resizeCanvas();
  fetch('/status')
    .then(r => r.json())
    .then(updatePanels)
    .catch(e => console.error('Initial fetch failed', e));
  connect();
});
</script>
</body>
</html>
